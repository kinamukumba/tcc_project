<!doctype html>
<html lang="pt">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="../image/favicon.png" type="image/png">
    <title>Epic Sana Luanda</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../vendors/linericon/style.css">
    <link rel="stylesheet" href="../css/font-awesome.min.css">
    <link rel="stylesheet" href="../vendors/owl-carousel/owl.carousel.min.css">
    <link rel="stylesheet" href="../vendors/bootstrap-datepicker/bootstrap-datetimepicker.min.css">
    <link rel="stylesheet" href="../vendors/nice-select/css/nice-select.css">
    <link rel="stylesheet" href="../vendors/owl-carousel/owl.carousel.min.css">
    <!-- main css -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body class="body-login">
    <div class="form-img">
        <div class="container">
            <div class="banner_content text-center">
                <h6>Longe da vida monótona</h6>
                <h2>Relaxe sua Mente</h2>
                <p>O Epic Sana Luanda oferece uma experiência de luxo incomparável em Luanda,<br> com vistas
                    deslumbrantes e serviços de primeira classe.</p>
            </div>
        </div>
    </div>
    <form>
        <a href="../index.html"><img src="../image/Logo.png" alt=""></a>
        <h1>Registe-se</h1>
        <div class="form-group">
            <label for="InputName">Nome completo</label>
            <input type="text" class="form-control" id="InputName" aria-describedby="NameHelp">
        </div>
        <div class="form-group">
            <label for="InputEmail">Email</label>
            <input type="email" class="form-control" id="InputEmail" aria-describedby="emailHelp">
            <small id="emailHelp" class="form-text text-muted">Nunca compartilharemos seu e-mail com ninguém.</small>
        </div>
        <div class="form-group">
            <label for="InputPhone">Telefone</label>
            <input type="tel" class="form-control" id="InputPhone" aria-describedby="PhoneHelp">
        </div>
        <div class="form-group">
            <label for="InputPassword">Senha</label>
            <input type="password" class="form-control" id="InputPassword">
        </div>
        <button type="submit" class="btn theme_btn">Registar</button>

        <span class="option-register">
            <p>Já tem uma conta? </p>
            <a href="login.html">Entre aqui</a>
        </span>
    </form>
</body>
